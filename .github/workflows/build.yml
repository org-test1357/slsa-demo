name: SLSA Secure Build

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/app
          TAG=${{ github.sha }}

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and Push image
        id: build
        run: |
          IMAGE=${{ steps.meta.outputs.image }}
          TAG=${{ steps.meta.outputs.tag }}

          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

          DIGEST=$(docker buildx imagetools inspect $IMAGE:$TAG --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Generate Provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Create Storage Record
        uses: actions/github-script@v7
        with:
          script: |
            await github.request('POST /repos/{owner}/{repo}/artifact-metadata/storage-records', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_digest: '${{ steps.build.outputs.digest }}',
              registry: 'ghcr',
              registry_url: '${{ steps.meta.outputs.image }}',
              tags: ['${{ steps.meta.outputs.tag }}']
            })

      - name: Create Deployment Record
        uses: actions/github-script@v7
        with:
          script: |
            await github.request('POST /repos/{owner}/{repo}/artifact-metadata/deployment-records', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_digest: '${{ steps.build.outputs.digest }}',
              environment: 'production',
              deployment_target: 'demo-env',
              runtime_risk: {
                internet_exposed: true,
                handles_sensitive_data: false
              }
            })
