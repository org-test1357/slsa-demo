name: SLSA Secure Build + Artifact Metadata

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # -------------------------------
      # METADATA
      # -------------------------------
      - name: Extract metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/slsa-demo/app
          TAG=${{ github.sha }}

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # -------------------------------
      # BUILD + PUSH
      # -------------------------------
      - name: Build and Push image
        id: build
        run: |
          IMAGE=${{ steps.meta.outputs.image }}
          TAG=${{ steps.meta.outputs.tag }}

          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

          DIGEST=$(docker buildx imagetools inspect $IMAGE:$TAG --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      # -------------------------------
      # SLSA PROVENANCE
      # -------------------------------
      - name: Generate Provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # -------------------------------
      # STORAGE RECORD (ORG LEVEL)
      # -------------------------------
      - name: Create Storage Record
        run: |
          curl -X POST https://api.github.com/orgs/${{ github.repository_owner }}/artifact-metadata/storage-records \
            -H "Authorization: Bearer ${{ secrets.ORG_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "digest": "${{ steps.build.outputs.digest }}",
              "registry": "ghcr",
              "registry_url": "${{ steps.meta.outputs.image }}",
              "repository": "${{ github.repository }}"
            }'

      # -------------------------------
      # DEPLOYMENT RECORD
      # -------------------------------
      - name: Create Deployment Record
        run: |
          curl -X POST https://api.github.com/orgs/${{ github.repository_owner }}/artifact-metadata/deployment-records \
            -H "Authorization: Bearer ${{ secrets.ORG_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "name": "slsa-demo-app",
              "digest": "${{ steps.build.outputs.digest }}",
              "status": "deployed",
              "logical_environment": "production",
              "deployment_name": "prod-app",
              "runtime_risks": ["internet-exposed"]
            }'
